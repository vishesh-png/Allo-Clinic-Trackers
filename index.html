<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Allo — Clinic Trackers</title>
<style>
:root{
  --bg:#0f1216; --bar:#161a20; --ink:#e6e9ee; --ink2:#9aa3b0;
  --line:#2a303a; --accent:#6ea8ff; --accentsoft:#1c2740;
}
@media (prefers-color-scheme: light){
  :root{ --bg:#f6f7f9; --bar:#ffffff; --ink:#1a1d21; --ink2:#5f6672;
    --line:#e2e6ec; --accent:#155eef; --accentsoft:#eaf1ff; }
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;
  font:14px/1.4 -apple-system,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}
.bar{flex:none;display:flex;align-items:center;gap:18px;padding:10px 18px;
  background:var(--bar);border-bottom:1px solid var(--line)}
.brand{font-size:15px;font-weight:700;white-space:nowrap}
.brand small{display:block;font-size:11px;font-weight:500;color:var(--ink2);margin-top:1px}
.tabs{display:flex;gap:6px}
.tab{padding:8px 18px;border:1px solid var(--line);border-radius:9px;background:transparent;
  color:var(--ink2);font:inherit;font-weight:600;cursor:pointer;white-space:nowrap}
.tab:hover{color:var(--ink)}
.tab.active{background:var(--accentsoft);border-color:var(--accent);color:var(--accent)}
.stage{flex:1;position:relative}
iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--bg)}
iframe.hide{visibility:hidden;pointer-events:none}
.open{margin-left:auto}
.open a{color:var(--ink2);font-size:12px;text-decoration:none;border:1px solid var(--line);
  border-radius:8px;padding:6px 12px;white-space:nowrap}
.open a:hover{color:var(--ink);border-color:var(--accent)}
</style>
</head>
<body>
<div class="bar">
  <div class="brand">Allo — Clinic Trackers<small>Revenue &amp; Macro analysis</small></div>
  <div class="tabs">
    <button class="tab active" data-t="rev">Revenue</button>
    <button class="tab" data-t="macro">Macro Analysis</button>
  </div>
  <div class="open"><a id="openLink" href="#" target="_blank" rel="noopener">Open full ↗</a></div>
</div>
<div class="stage">
  <iframe id="rev"   title="Clinic Pulse — Revenue"></iframe>
  <iframe id="macro" title="Macro Analysis" class="hide"></iframe>
</div>
<script>
const SRC = {
  rev:   'https://vishesh-png.github.io/Clinic-Pulse-Tracker/',
  macro: 'https://vishesh-png.github.io/Macro-Level-Analysis/'
};
const frames = { rev:document.getElementById('rev'), macro:document.getElementById('macro') };
const loaded = {};
function show(t){
  // lazy-load an iframe the first time its tab is opened
  if(!loaded[t]){ frames[t].src = SRC[t]; loaded[t] = true; }
  for(const k in frames) frames[k].classList.toggle('hide', k!==t);
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b.dataset.t===t));
  document.getElementById('openLink').href = SRC[t];
  try{ history.replaceState(null,'', '#'+t); }catch(e){}
}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>show(b.dataset.t)));
show(location.hash==='#macro' ? 'macro' : 'rev');
</script>
</body>
</html>
